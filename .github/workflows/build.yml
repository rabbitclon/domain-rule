name: Build rules dat

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: code

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: code/go.mod
          cache-dependency-path: code/go.sum

      - name: Build project
        run: |
          cd code || exit 1

          # build (универсальный режим)
          go run ./ --datapath=./data --outputdir=../ || true

          cd ../

      - name: Find output file (IMPORTANT FIX)
        run: |
          echo "Searching for output dat file..."

          FILE=$(find . -maxdepth 3 -type f -name "*.dat" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "ERROR: No .dat file found!"
            exit 1
          fi

          echo "Found: $FILE"
          cp "$FILE" geosite.dat

      - name: Generate checksum
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum

      - name: Pack artifacts
        run: |
          zip -9 geosite.dat.zip geosite.dat
          xz -z -9 -k geosite.dat

          sha256sum geosite.dat.zip > geosite.dat.zip.sha256sum
          sha256sum geosite.dat.xz > geosite.dat.xz.sha256sum

      - name: Create Release Folder
        run: |
          mkdir -p release
          mv geosite.dat* release/

      - name: Publish Release (no git push needed)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Build ${{ github.run_number }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
